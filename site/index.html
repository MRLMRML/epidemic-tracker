<head>

<title>Global Epidemic Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1419;--panel:#1a2332;--card:#22303c;--border:#2d3b50;--text:#8899a6;--bright:#e7e9ea;--muted:#657786;--red:#f4212e;--amber:#ffa502;--green:#00ba7c;--blue:#1d9bf0;--purple:#a855f7;--cyan:#00c9db}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.top{background:var(--red);color:white;text-align:center;padding:4px;font-size:11px;font-weight:700;flex-shrink:0}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;color:white}
.sel{background:var(--card);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit}

.news-bar{background:var(--panel);border-bottom:1px solid var(--border);height:28px;overflow:hidden;display:flex;align-items:center;cursor:pointer;flex-shrink:0}
.news-lbl{background:var(--red);color:white;padding:0 8px;font-size:10px;font-weight:700;height:100%;display:flex;align-items:center;flex-shrink:0}
.news-scroll{flex:1;height:100%;overflow:hidden;position:relative}
.news-inner{position:absolute;width:100%;animation:ns 10s linear infinite}
@keyframes ns{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
.ni{height:28px;line-height:28px;padding:0 12px;font-size:12px;white-space:nowrap;overflow:hidden}
.ni .dot{color:var(--red);margin-right:6px}

.filters{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.fgroup{display:flex;gap:4px;align-items:center}
.fgroup label{font-size:10px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.fsel{background:var(--card);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit;min-width:100px}
.rst{background:transparent;color:var(--muted);border:1px solid var(--border);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}

.stats{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.st{background:var(--panel);padding:8px;text-align:center;border-right:1px solid var(--border)}.st:last-child{border-right:none}
.stv{font-size:18px;font-weight:700}.stl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.st:nth-child(1) .stv{color:var(--red)}.st:nth-child(2) .stv{color:var(--amber)}.st:nth-child(3) .stv{color:var(--blue)}.st:nth-child(4) .stv{color:var(--purple)}.st:nth-child(5) .stv{color:var(--green)}

.main{display:grid;grid-template-columns:1fr 360px;flex:1;min-height:0}
#map{width:100%;height:100%}
.leaflet-container{background:#1a2332!important}

.side{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
.side-body{flex:1;overflow-y:auto;padding:6px}
.side-body::-webkit-scrollbar{width:4px}.side-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:5px;cursor:pointer;border-left:4px solid transparent;transition:all 0.15s}
.card:hover{transform:translateX(2px);border-color:var(--cyan)}
.card.vh{border-left-color:#f4212e}.card.hi{border-left-color:#ffa502}.card.mo{border-left-color:#1d9bf0}.card.lo{border-left-color:#00ba7c}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.card-nm{font-size:13px;font-weight:600;color:var(--bright)}
.card-sev{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;color:white}
.card-sev.vh{background:#f4212e}.card-sev.hi{background:#ffa502}.card-sev.mo{background:#1d9bf0}.card-sev.lo{background:#00ba7c}
.card-loc{font-size:11px;color:var(--muted);margin-bottom:3px}
.card-nums{display:flex;gap:8px;font-size:12px;margin-bottom:4px}.card-nums b{color:var(--bright)}
.card-src{display:flex;gap:4px;align-items:center;margin-top:4px;font-size:10px;flex-wrap:wrap}
.tag{padding:2px 5px;border-radius:3px}
.tag-src{background:rgba(29,155,240,0.1);color:var(--blue)}
.tag-conf-h{background:rgba(0,186,124,0.12);color:var(--green)}
.tag-conf-m{background:rgba(255,173,31,0.12);color:var(--amber)}
.tag-conf-p{background:rgba(100,100,100,0.2);color:var(--muted)}
.tag-h2h{background:rgba(244,33,46,0.15);color:var(--red)}
.tag-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.tag-bar-fill{height:100%;border-radius:2px}

.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}.mbg.open{display:flex}
.mod{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:92%;max-width:650px;max-height:85vh;overflow-y:auto;padding:20px;position:relative}
.mod h2{color:var(--cyan);font-size:17px;margin-bottom:8px}
.mcls{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.pbtns{display:flex;gap:6px;margin:10px 0}
.pb{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}.pb:hover{border-color:var(--cyan)}
.pb.on{background:var(--cyan);color:var(--bg);border-color:var(--cyan);font-weight:700}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;height:260px;margin-bottom:12px}
.ftr{background:var(--panel);border-top:1px solid var(--border);padding:4px 16px;font-size:10px;color:var(--muted);text-align:center;flex-shrink:0}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto}#map{height:40vh}.filters{flex-direction:column}}
</style>
</head>

var AL={"covid":["COVID","coronavirus","sars-cov-2","\u65b0\u51a0"],"\u65b0\u51a0":["COVID"],"ebola":["Ebola Virus Disease"],"\u57c3\u535a\u62c9":["Ebola Virus Disease"],"\u970d\u4e71":["Cholera"],"cholera":["Cholera"],"\u767b\u9769\u70ed":["Dengue"],"dengue":["Dengue"],"\u9ebb\u75b9":["Measles"],"measles":["Measles"],"\u6c49\u5766":["Hantavirus"],"hanta":["Hantavirus"],"\u7334\u75d8":["Mpox"],"monkeypox":["Mpox"],"\u79bd\u6d41\u611f":["Avian Influenza"],"bird flu":["Avian Influenza"],"\u6d41\u611f":["Influenza"],"flu":["Influenza"],"\u759f\u75be":["Malaria"],"malaria":["Malaria"],"\u9f20\u75ab":["Plague"],"plague":["Plague"],"\u975e\u5178":["SARS"],"sars":["SARS"],"\u8111\u819c\u708e":["Meningococcal Meningitis"],"\u4f24\u5bd2":["Typhoid fever"],"typhoid":["Typhoid fever"],"\u72c2\u72ac\u75c5":["Rabies"],"rabies":["Rabies"]};

function cn(iso){return CNAMES[iso]||iso}
function dn(n){return n}
function tip(n){return TIP[n]||""}
function fmt(n){if(!n)return"\u2014";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return String(n)}
function pct(a,b){return b>0?((a/b)*100).toFixed(1)+"%":"\u2014"}
function sevL(s){return s==="very_high"?"\u6781\u9ad8":s==="high"?"\u9ad8":s==="moderate"?"\u4e2d\u7b49":"\u4f4e"}

function setLang(l){
    lang=l;
    // Update DN display
    if(l!=='zh'){dn=function(n){return n}}else{dn=function(n){return n}}
    populateFilters();
    if(allData)render(allData);
}

function resetAll(){
    document.getElementById('cont-sel').value='';
    document.getElementById('csel').value='';
    document.getElementById('path-sel').value='';
    document.getElementById('dsel').value='';
    document.getElementById('vsel').value='';
    if(allData)render(allData);
    if(map)map.flyTo([20,0],2,{duration:0.5});
}

function onContChange(){
    var cont=document.getElementById('cont-sel').value;
    populateCountryFilter(cont);
    doFilter();
}

function onPathChange(){
    var path=document.getElementById('path-sel').value;
    populateDiseaseFilter(path);
    doFilter();
}

function doFilter(){
    if(allData)render(allData);
}

function populateFilters(){
    if(!allData)return;
    var o=allData.outbreaks;
    
    // Continents
    var conts=new Set();
    o.forEach(function(x){if(x.continent)conts.add(x.continent)});
    var csel=document.getElementById('cont-sel');
    var cv=csel.value;
    csel.innerHTML='<option value="">'+(lang==='zh'?"\u6240\u6709\u5927\u6d32":"All Continents")+'</option>';
    Array.from(conts).sort().forEach(function(c){
        var opt=document.createElement('option');opt.value=c;opt.textContent=c;csel.appendChild(opt);
    });
    csel.value=cv;
    
    // Pathogen types
    var paths=new Set();
    o.forEach(function(x){if(x.pathogen_type)paths.add(x.pathogen_type)});
    var psel=document.getElementById('path-sel');
    var pv=psel.value;
    psel.innerHTML='<option value="">'+(lang==='zh'?"\u6240\u6709\u7c7b\u578b":"All Types")+'</option>';
    var pathLabels={Virus:lang==='zh'?'\u75c5\u6bd2':'Virus',Bacteria:lang==='zh'?'\u7ec6\u83cc':'Bacteria',Parasite:lang==='zh'?'\u5bc4\u751f\u866b':'Parasite',Unknown:lang==='zh'?'\u672a\u77e5':'Unknown'};
    Array.from(paths).sort().forEach(function(p){
        var opt=document.createElement('option');opt.value=p;opt.textContent=pathLabels[p]||p;psel.appendChild(opt);
    });
    psel.value=pv;
    
    populateCountryFilter(document.getElementById('cont-sel').value);
    populateDiseaseFilter(document.getElementById('path-sel').value);
}

function populateCountryFilter(cont){
    if(!allData)return;
    var o=allData.outbreaks;
    var cs=new Set();
    o.forEach(function(x){
        if(cont && x.continent!==cont)return;
        if(x.country_iso3)cs.add(x.country_iso3);
    });
    var sel=document.getElementById('csel');
    var cv=sel.value;
    sel.innerHTML='<option value="">'+(lang==='zh'?"\u6240\u6709\u56fd\u5bb6":"All Countries")+'</option>';
    Array.from(cs).sort(function(a,b){return cn(a).localeCompare(cn(b))}).forEach(function(iso){
        var opt=document.createElement('option');opt.value=iso;opt.textContent=cn(iso);sel.appendChild(opt);
    });
    sel.value=cv;
}

function populateDiseaseFilter(path){
    if(!allData)return;
    var o=allData.outbreaks;
    var ds=new Set();
    o.forEach(function(x){
        if(path && x.pathogen_type!==path)return;
        ds.add(x.disease);
    });
    var sel=document.getElementById('dsel');
    var dv=sel.value;
    sel.innerHTML='<option value="">'+(lang==='zh'?"\u6240\u6709\u75be\u75c5":"All Diseases")+'</option>';
    Array.from(ds).sort().forEach(function(d){
        var opt=document.createElement('option');opt.value=d;opt.textContent=dn(d);sel.appendChild(opt);
    });
    sel.value=dv;
}

function init(){
    map=L.map('map',{zoomControl:true,attributionControl:false}).setView([20,0],2);
    L.tileLayer('https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    cl=L.markerClusterGroup({maxClusterRadius:50,showCoverageOnHover:false,iconCreateFunction:function(c){
        var n=c.getChildCount(),r=n<5?18:n<15?26:n<50?34:42;
        return L.divIcon({html:'<div style="width:'+r+'px;height:'+r+'px;border-radius:50%;background:rgba(0,201,219,0.2);border:2px solid rgba(0,201,219,0.5);display:flex;align-items:center;justify-content:center;color:#00c9db;font-weight:700;font-size:'+(r<26?10:12)+'px">'+n+'</div>',className:"",iconSize:[r,r]});
    }});
    map.addLayer(cl);
    load();setInterval(load,600000);
    window.addEventListener('resize',function(){map.invalidateSize()});
}

function load(){
    fetch('data/epidemics.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){
        allData=d;populateFilters();render(d);
    }).catch(function(e){console.error('Load failed:',e)});
}

function render(d){
    var o=d.outbreaks.slice();
    var cont=document.getElementById('cont-sel').value;
    var ctry=document.getElementById('csel').value;
    var path=document.getElementById('path-sel').value;
    var dis=document.getElementById('dsel').value;
    var sev=document.getElementById('vsel').value;

    if(cont)o=o.filter(function(x){return x.continent===cont});
    if(ctry)o=o.filter(function(x){return x.country_iso3===ctry});
    if(path)o=o.filter(function(x){return x.pathogen_type===path});
    if(dis)o=o.filter(function(x){return x.disease===dis});
    if(sev==='h2h'){o=o.filter(function(x){return x.h2h_transmission})}
    else if(sev){o=o.filter(function(x){return x.severity===sev})}

    var tc=0,td=0;o.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});
    document.getElementById('stats').innerHTML=
        '<div class="st"><div class="st-v">'+o.length+'</div><div class="st-l">'+(lang==='zh'?'\u6d3b\u8dc3\u75ab\u60c5':'ACTIVE')+'</div></div>'+
        '<div class="st"><div class="st-v">'+fmt(tc)+'</div><div class="st-l">'+(lang==='zh'?'\u75c5\u4f8b':'CASES')+'</div></div>'+
        '<div class="st"><div class="st-v">'+fmt(td)+'</div><div class="st-l">'+(lang==='zh'?'\u6b7b\u4ea1':'DEATHS')+'</div></div>'+
        '<div class="st"><div class="st-v">'+pct(td,tc)+'</div><div class="st-l">'+(lang==='zh'?'\u81f4\u6b7b\u7387':'CFR')+'</div></div>'+
        '<div class="st"><div class="st-v">'+new Set(o.map(function(x){return x.country_iso3})).size+'</div><div class="st-l">'+(lang==='zh'?'\u56fd\u5bb6':'COUNTRIES')+'</div></div>';

    renderMap(o);renderNews(d.outbreaks);renderList(o);
}

function renderMap(o){
    cl.clearLayers();
    o.forEach(function(x){
        if(!x.latitude&&!x.longitude)return;
        var c=SC[x.severity]||'#657786',r=Math.max(4,Math.min(18,Math.sqrt(x.cases||1)*1.2));
        var m=L.circleMarker([x.latitude,x.longitude],{radius:r,color:c,fillColor:c,fillOpacity:0.45,weight:1.5});
        m.bindPopup('<b>'+dn(x.disease)+'</b>'+(x.h2h_transmission?' <b style="color:#f4212e">H2H</b>':'')+'<br>\ud83d\udccd '+cn(x.country_iso3)+'<br>'+(lang==='zh'?'\u75c5\u4f8b':'Cases')+': <b>'+fmt(x.cases)+'</b> \xb7 '+(lang==='zh'?'\u6b7b\u4ea1':'Deaths')+': <b>'+fmt(x.deaths)+'</b>'+(x.source_url?'<br><a href="'+x.source_url+'" target="_blank">WHO \u2192</a>':''));
        cl.addLayer(m);
    });
}

function renderNews(o){
    var top=o.filter(function(x){return x.description&&x.cases>0}).sort(function(a,b){return new Date(b.date_reported)-new Date(a.date_reported)}).slice(0,15);
    var h='';
    top.forEach(function(x){
        h+='<div class="ni"><span class="dot">\u25cf</span>'+dn(x.disease)+' \u2014 '+cn(x.country_iso3)+': '+fmt(x.cases)+' '+(lang==='zh'?'\u4f8b':'cases')+'</div>';
    });
    document.getElementById('nlist').innerHTML=h+h;
}

function renderList(o){
    var g={};
    o.forEach(function(x){
        var k=x.disease;
        if(!g[k])g[k]={disease:k,cases:0,deaths:0,severity:'low',h2h:false,countries:new Set(),sources:new Set(),conf:'pending',continent:new Set()};
        var d=g[k];
        d.cases+=x.cases||0;d.deaths+=x.deaths||0;
        d.countries.add(x.country_iso3);d.continent.add(x.continent||'Unknown');
        if(x.h2h_transmission)d.h2h=true;
        if(x.source)d.sources.add(x.source);
        if(x.confidence==='high')d.conf='high';
        var so=SO[x.severity]||9;if(so<(SO[d.severity]||9))d.severity=x.severity;
    });
    var list=Object.values(g).sort(function(a,b){return(SO[a.severity]||9)-(SO[b.severity]||9)});
    var maxC=Math.max.apply(null,o.map(function(x){return x.cases||0}).concat([1]));
    var h='';
    list.forEach(function(x){
        var cls=x.severity==='very_high'?'vh':x.severity==='high'?'hi':x.severity==='moderate'?'mo':'lo';
        var t=tip(x.disease);var tt=t?'<span class="tip">'+t+'</span>':'';
        var h2h=x.h2h?'<span class="tag tag-h2h">H2H</span>':'';
        var confTag=x.conf==='high'?'<span class="tag tag-conf-h">High</span>':'<span class="tag tag-conf-p">Pending</span>';
        var srcTags='';
        x.sources.forEach(function(s){srcTags+='<span class="tag tag-src">'+s+'</span>'});
        var barW=Math.max(2,Math.min(100,(x.cases/maxC)*100));
        var barColor=SC[x.severity]||'#657786';
        h+='<div class="card '+cls+'" onclick="openD(\''+x.disease.replace(/'/g,"\\\\'")+'\')">';
        h+='<div class="card-hd"><span class="card-nm">'+dn(x.disease)+tt+'</span><span class="card-sev '+cls+'">'+sevL(x.severity)+'</span></div>';
        h+='<div class="card-loc">'+x.countries.size+' '+(lang==='zh'?'\u56fd\u5bb6':'countries')+' \xb7 '+Array.from(x.continent).join(', ')+'</div>';
        h+='<div class="card-nums"><span>'+(lang==='zh'?'\u75c5\u4f8b':'Cases')+': <b>'+fmt(x.cases)+'</b></span><span>'+(lang==='zh'?'\u6b7b\u4ea1':'Deaths')+': <b>'+fmt(x.deaths)+'</b></span><span>CFR: '+pct(x.deaths,x.cases)+'</span></div>';
        h+='<div class="tag-bar"><div class="tag-bar-fill" style="width:'+barW+'%;background:'+barColor+'"></div></div>';
        h+='<div class="card-src">'+h2h+confTag+srcTags+'</div></div>';
    });
    document.getElementById('list').innerHTML=h;
}

function openD(disease){
    var items=allData.outbreaks.filter(function(x){return x.disease===disease});
    var tc=0,td=0;items.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});
    var t=tip(disease);var now=new Date();
    var p7=0,p30=0,p180=0;
    items.forEach(function(x){var d=(now-new Date(x.date_reported))/86400000;if(d<=7)p7+=x.cases||0;if(d<=30)p30+=x.cases||0;if(d<=180)p180+=x.cases||0});
    
    var h='<button class="mcls" onclick="document.getElementById(\'dbg\').classList.remove(\'open\')">&times;</button>';
    h+='<h2>'+dn(disease)+'</h2>';
    if(t)h+='<p style="font-size:12px;color:var(--text);margin-bottom:10px">'+t+'</p>';
    h+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+items.length+' outbreaks \xb7 '+new Set(items.map(function(x){return x.country_iso3})).size+' '+(lang==='zh'?'\u56fd\u5bb6':'countries')+'</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">';
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--red)">'+fmt(p7||null)+'</div><div style="font-size:10px;color:var(--muted)">'+(lang==='zh'?'\u8fd17\u5929':'7 Days')+'</div></div>';
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--amber)">'+fmt(p30||null)+'</div><div style="font-size:10px;color:var(--muted)">'+(lang==='zh'?'\u8fd130\u5929':'30 Days')+'</div></div>';
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--blue)">'+fmt(p180||null)+'</div><div style="font-size:10px;color:var(--muted)">'+(lang==='zh'?'\u534a\u5e74':'6 Months')+'</div></div></div>';
    h+='<div class="pbtns"><button class="pb" onclick="drawC(\''+disease.replace(/'/g,"\\\\'")+'\',7)">'+(lang==='zh'?'\u8fd17\u5929':'7D')+'</button><button class="pb on" onclick="drawC(\''+disease.replace(/'/g,"\\\\'")+'\',30)">'+(lang==='zh'?'\u8fd130\u5929':'30D')+'</button><button class="pb" onclick="drawC(\''+disease.replace(/'/g,"\\\\'")+'\',180)">'+(lang==='zh'?'\u534a\u5e74':'6M')+'</button></div>';
    h+='<div class="cbox"><canvas id="dc"></canvas></div>';
    h+='<div style="font-size:13px;color:var(--bright);font-weight:600">'+(lang==='zh'?'\u7d2f\u8ba1':'Total')+': '+(tc?tc.toLocaleString():"\u2014")+' '+(lang==='zh'?'\u75c5\u4f8b':'cases')+' \xb7 '+(td?td.toLocaleString():"\u2014")+' '+(lang==='zh'?'\u6b7b\u4ea1':'deaths')+' \xb7 CFR '+pct(td,tc)+'</div>';
    document.getElementById('dm').innerHTML=h;
    document.getElementById('dbg').classList.add('open');
    setTimeout(function(){drawC(disease,30)},100);
}

function drawC(disease,days){
    document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('on')});
    if(event&&event.target&&event.target.classList)event.target.classList.add('on');
    var items=allData.outbreaks.filter(function(x){return x.disease===disease});
    var now=new Date();var n=days<=7?7:days<=30?30:6;
    var buckets=new Array(n).fill(0);var labels=[];
    if(days<=7){for(var d=6;d>=0;d--){var dt=new Date(now-d*86400000);labels.push((dt.getMonth()+1)+'/'+dt.getDate())}items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<7)buckets[6-diff]+=x.cases||0})}
    else if(days<=30){buckets=new Array(30).fill(0);for(var d=29;d>=0;d--){var dt=new Date(now-d*86400000);labels.push(d%5===0?(dt.getMonth()+1)+'/'+dt.getDate():'')}items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<30)buckets[29-diff]+=x.cases||0})}
    else{for(var m=5;m>=0;m--){var dt=new Date(now.getFullYear(),now.getMonth()-m,1);labels.push(dt.getFullYear()+'/'+(dt.getMonth()+1))}items.forEach(function(x){var dt=new Date(x.date_reported);var diff=Math.floor((now-dt)/86400000/30);if(diff>=0&&diff<6)buckets[5-diff]+=x.cases||0})}
    var ctx=document.getElementById('dc');if(!ctx)return;
    if(myChart)myChart.destroy();
    myChart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:lang==='zh'?'\u75c5\u4f8b':'Cases',data:buckets,borderColor:'#00c9db',backgroundColor:'rgba(0,201,219,0.08)',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#00c9db',pointBorderColor:'#0f1419',pointBorderWidth:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8899a6'}}},scales:{x:{title:{display:true,text:days<=30?(lang==='zh'?'\u65e5\u671f':'Date'):(lang==='zh'?'\u6708\u4efd':'Month'),color:'#8899a6'},grid:{color:'rgba(45,59,80,0.5)'},ticks:{color:'#8899a6',maxRotation:0}},y:{title:{display:true,text:lang==='zh'?'\u75c5\u4f8b':'Cases',color:'#8899a6'},grid:{color:'rgba(45,59,80,0.5)'},ticks:{color:'#8899a6'},beginAtZero:true}}}});
}

function openNews(){
    if(!allData)return;
    var o=allData.outbreaks.filter(function(x){return x.description&&x.cases>0}).sort(function(a,b){return new Date(b.date_reported)-new Date(a.date_reported)}).slice(0,30);
    var h='';
    o.forEach(function(x){
        var d=x.date_reported?new Date(x.date_reported).toLocaleDateString():'';
        h+='<div style="padding:10px 0;border-bottom:1px solid var(--border)">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
        h+='<b style="color:var(--bright)">'+dn(x.disease)+'</b>';
        h+='<span style="font-size:10px;color:var(--muted)">'+d+'</span></div>';
        h+='<div style="font-size:12px;color:var(--muted);margin-bottom:4px">'+cn(x.country_iso3)+' | '+(lang==='zh'?'\u75c5\u4f8b':'Cases')+': '+(x.cases||0).toLocaleString()+' | '+(lang==='zh'?'\u6b7b\u4ea1':'Deaths')+': '+(x.deaths||0).toLocaleString()+'</div>';
        h+='<div style="font-size:12px;color:var(--text)">'+(x.description||'').substring(0,250)+'</div>';
        if(x.source_url)h+='<a href="'+x.source_url+'" target="_blank" style="font-size:11px;margin-top:4px;display:inline-block">\u2192 WHO DON</a>';
        h+='</div>';
    });
    document.getElementById('na').innerHTML=h;
    document.getElementById('nt').textContent=lang==='zh'?'\u7a81\u53d1\u65b0\u95fb':'Breaking News';
    document.getElementById('nbg').classList.add('open');
}

window.addEventListener('load',init);
</script>
</body>
</html>
